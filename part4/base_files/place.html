<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Place Details</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <!-- Mandatory -->
        <img class="logo" src="logo.png" alt="site-logo">
        <div class="login-button">
            <a class="login-button" href="login.html" id="login-link">Login</a>
        </div>
        <nav>
            <div id="navigation">
                <a href="index.html" id="index-link">Homepage</a>
                <a href="login.html" id="login-link">Login</a>
            </div>
        </nav>
    </header>
    <main>
        <section class="place-details">
            <!-- Place details will be populated dynamically -->
             <ul class="place-info">
                <li>Host</li>
                <li>Price</li>
                <li>Description</li>
                <li>Amenities</li>
             </ul>
        </section>
        <section id="reviews">
            <!-- Reviews will be populated dynamically -->
             <ul class="review-card">
                <li>Comment</li>
                <li>User</li>
                <li>Rating</li>
                
            </ul>
        </section>
        <section id="add-review">
            <h2>Add a Review</h2>
            <form id="review-form">
                <label for="review-text">Review:</label>
                <textarea id="review-text" name="review-text" required></textarea>
                
                <button type="submit">Submit</button>
            </form>
        </section>
    </main>
    <script src="scripts.js"></script>
</body>
</html>
