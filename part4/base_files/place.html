<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="icon" type="image/x-icon" href="beach-logo.png">
	<title>List of Places</title>
	<link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
		<!-- Mandatory -->
		<div id="logo-and-login">
			<img class="logo" src="logo.png" alt="site-logo">
			<button class="login-button">
				<a href="login.html" id="login-link">Login</a>
			</button>
		</div>
		<nav>
			<div id="navigation">
				<a href="index.html" id="index-link">Homepage</a>
				<a href="login.html" id="login-link">Login</a>
                <a href="place.html" id="place-link">Place</a>
                <a href="add_review.html" id="review-link">Review</a>
			</div>
		</nav>
	</header>
    <main>
        <section id="place-details">
            <!-- Place details will be populated dynamically -->
             <table class="actual-table">
                <caption><strong>Place</strong></caption>
                <thead>
                    <tr>
                        <th scope="col">Host</th>
                        <th scope="col">Price</th>
                        <th scope="col">Description</th>
                        <th scope="col">Amenities</th>
                    </tr>
                </thead>
                <tbody>
                    <tr class="place-info">
                        <th scope="row">Elliot</th>
                        <td>100$ / night</td>
                        <td>Night Club</td>
                        <td>Jacuzzi / Pool / Sauna / </td>
                    </tr>
                </tbody>
             </table>
        </section>
        <section id="reviews">
            <!-- Reviews will be populated dynamically -->
             <script>
                async function getData() {
                    const url = "http://127.0.0.1:5000/api/v1/places/{places_id}";
                    try {
                      const response = await fetch(url, {method: "GET"});
                      if (!response.ok) {
                        throw new Error(`Response status: ${response.status}`);
                      }
                  
                      const result = await response.json();
                      console.log(result);
                    } catch (error) {
                      console.error(error.message);
                    }
                }
             </script>
        </section>
        <section id="add-review">
            <h2>Add a Review</h2>
            <form id="review-form">
                <label for="review-text">Review:</label>
                <textarea id="review-text" name="review-text" required></textarea>
                
                <button type="submit">Submit</button>
            </form>
        </section>
    </main>
    <script src="scripts.js"></script>
    <footer class="footer-container">
		<hr>
		<p>All rights reserved</p>
	</footer>
</body>
</html>
