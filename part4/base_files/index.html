<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="icon" type="image/x-icon" href="beach-logo.png">
	<title>List of Places</title>
	<link rel="stylesheet" href="styles.css">
</head>
<body>
	<header>
		<!-- Mandatory -->
		<div id="logo-and-login">
			<img class="logo" src="logo.png" alt="site-logo">
			<button class="login-button">
				<a href="login.html" id="login-link">Login</a>
			</button>
		</div>
		<nav>
			<div id="navigation">
				<a href="index.html" id="index-link">Homepage</a>
				<a href="login.html" id="login-link">Login</a>
				<a href="place.html" id="place-link">Place</a>
                <a href="add_review.html" id="review-link">Review</a>
			</div>
		</nav>
	</header>
	<main>
		<section id="places-list">
			<!-- List of places will be populated dynamically -->
			<table>
				<caption>
					<section id="filter">
						<label for="price-filter">Max Price:</label>
						<select id="price-filter">
						<!-- Options will be populated dynamically -->
						</select>
					</section>
				</caption>
				<tr class="cards">
					<td class="place-card">
					   <h3>Place Name</h3>
					   <p>Price</p>
					   <button class="details-button">View Details</button>
					</td>
					<td class="place-card">
						<h3>Place Name</h3>
						<p>Price</p>
						<button class="details-button">View Details</button>
					</td>
					<td class="place-card">
						<h3>Place Name</h3>
						<p>Price</p>
						<button class="details-button">View Details</button>
				   </td>
				</tr>
			</table>
		</section>
	</main>
	<script src="scripts.js"></script>
	<footer class="footer-container">
		<hr>
		<p>All rights reserved</p>
	</footer>
</body>
</html>
